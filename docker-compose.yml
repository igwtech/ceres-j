services:
  postgres:
    image: postgres:16-alpine
    container_name: neocron-postgres
    environment:
      POSTGRES_DB: ceres
      POSTGRES_USER: ceres
      POSTGRES_PASSWORD: ceres
    network_mode: host
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceres -d ceres"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  ceres:
    build: .
    container_name: neocron-server
    stdin_open: true
    tty: true
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ceres.docker.cfg:/app/ceres.cfg:ro
      - ./data/database:/app/database
      - ${NC2_CLIENT_PATH:-/home/javier/Neocron2}:/client:ro
    restart: unless-stopped
