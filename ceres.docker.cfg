# Ceres-J configuration file (Docker)

GUI = false

Debug = unknownPackets,events

StartWebServer = true
WebServerPort = 8080
# Web admin dashboard (#180): bound to loopback; token-gated, fail-closed.
WebServerBindAddress = 127.0.0.1
WebAdminToken = ceres-admin-2026
WebAdminCorsOrigins =

# With network_mode: host, the container shares the host network stack.
# Set to your machine's LAN IP so Wine/Proton clients can reach UDP.
ServerIPLocal = 192.168.68.108
ServerIPWAN = off

ServerVersion = 111
ServerName = Ceres-J Docker

AutoCreateAccounts = true
CharsPerAccount = 4

NC2ClientPath = /client

# Database backend (PostgreSQL via the `postgres` service in docker-compose).
# Connect over loopback since the postgres container also uses host networking.
Database.url = jdbc:postgresql://127.0.0.1:5432/ceres
Database.user = ceres
Database.password = ceres
