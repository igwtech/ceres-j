# Ceres-J configuration file
# Neocron 2 Server Emulator

GUI = true
#GUI = false

Debug = unknownPackets,sendingPackets,events
#Debug =
# Tokens (comma-separated): unknownPackets, sendingPackets, events,
#   receivedPackets, subPackets, wire
# 'wire' (task #198): parsed in/out wire log — every C->S datagram
#   processed and every S->C datagram sent is dumped as a structured
#   multi-line block (direction, player, transport, 0x13 sub-packet
#   breakdown with op/sub-tag names + decoded fields, capped hex).
#   OFF by default; zero-overhead when absent. Enable e.g.:
#   Debug = unknownPackets,events,wire

StartWebServer = true
WebServerPort = 8080

# Network interface the web dashboard / API binds to.
# Defaults to loopback (127.0.0.1) so the admin API is NOT exposed to
# the network out of the box. Set to 0.0.0.0 only behind a reverse
# proxy / firewall, and only after changing WebAdminToken below.
WebServerBindAddress = 127.0.0.1

# Shared secret required by every POST /api/admin call. Send it as the
# "X-Admin-Token" header (or "token" field in the JSON body). Requests
# without a matching token are rejected 401. An empty/unset token
# DISABLES the admin API entirely (all calls 403) — set a strong random
# value before enabling remote administration. Online accounts flagged
# as "admin" may instead authenticate with X-Admin-Account / X-Admin-Pass.
WebAdminToken = changeme-please-set-a-strong-secret

# Comma-separated list of allowed CORS origins for the admin API.
# Empty = no CORS (same-origin dashboard only, the safe default).
# Example: WebAdminCorsOrigins = http://localhost:5173
WebAdminCorsOrigins =

# ServerIPLocal = auto
# ServerIPLocal = off
# ServerIPLocal = 192.168.1.1
# don't set this to 127.0.0.1 when running in Docker!
ServerIPLocal = auto

# LAN IP is always autodetected

# ServerIPWAN = auto
# ServerIPWAN = off
# ServerIPWAN = 123.123.123.123
ServerIPWAN = auto

ServerVersion = 111
ServerName = Ceres-J

# Comma-separated account usernames force-promoted to GM_ADMIN on
# every boot (case-insensitive). Reasserted into the in-memory
# Account after the DB load so it survives the autosave upsert.
# Empty = no forced admins.
AdminAccounts =

AutoCreateAccounts = true
CharsPerAccount = 4

# Path to a full patched Neocron 2 client installation
# linux example:
NC2ClientPath = /home/javier/Neocron2
# windows example:
# NC2ClientPath = C:\\Spiele\\neocron2
